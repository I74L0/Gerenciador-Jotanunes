services:
  db_mysql:
    image: mysql:8.0
    container_name: mysql_db_jotanunes
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -u root -p$$MYSQL_ROOT_PASSWORD" ]
      interval: 10s
      timeout: 5s
      retries: 40
      start_period: 60s
    networks:
      - jotanunes-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: frontend_jotanunes
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev
    restart: always
    networks:
      - jotanunes-net
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    container_name: redis_jotanunes
    restart: always
    networks:
      - jotanunes-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: django_backend_jotanunes
    command: >
      sh -c "python manage.py migrate &&
             echo '' &&
             echo '#######################################################' &&
             echo '#       🚀 GERENCIADOR JOTANUNES - PRONTO!            #' &&
             echo '#######################################################' &&
             echo '#                                                     #' &&
             echo '#  👉 Frontend: http://localhost                      #' &&
             echo '#  👉 Backend API: http://localhost/api               #' &&
             echo '#                                                     #' &&
             echo '#######################################################' &&
             echo '' &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - staticfiles_volume:/app/staticfiles
      - mediafiles_volume:/app/mediafiles
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      db_mysql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "cat < /dev/null > /dev/tcp/127.0.0.1/8000 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: on-failure
    networks:
      - jotanunes-net

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: celery_worker_jotanunes
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started
      db_mysql:
        condition: service_healthy
    restart: always
    networks:
      - jotanunes-net

  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile.nginx
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: nginx_jotanunes
    ports:
      - "80:80"
    volumes:
      - staticfiles_volume:/app/staticfiles
      - mediafiles_volume:/app/mediafiles
    depends_on:
      - backend
    restart: always
    networks:
      - jotanunes-net

volumes:
  mysql_data:
  staticfiles_volume:
  mediafiles_volume:

networks:
  jotanunes-net:
    driver: bridge
